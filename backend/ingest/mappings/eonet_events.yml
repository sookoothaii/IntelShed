# FollowTheMoney mapping: NASA EONET natural events -> FtM Event entities.
# Consumed by the ingest pipeline (T2). Field names match the EONET feed.
eonet_events:
  rag:
    strategy: record
    max_chars: 560
    source_key: id
    rag_source: eonet
    body:
      - column: title
      - column: description
      - column: category
  queries:
    - entities:
        event:
          schema: Event
          keys:
            - id
          properties:
            name:
              column: title
            description:
              column: description
            date:
              column: date
            sourceUrl:
              column: link
            keywords:
              column: category
            latitude:
              column: lat
            longitude:
              column: lon
    - entities:
        event:
          schema: Event
          keys:
            - id
          properties:
            name:
              column: title
        place:
          schema: Address
          keys:
            - id
          properties:
            full:
              column: title
            latitude:
              column: lat
            longitude:
              column: lon
      require_any:
        - lat
        - lon
      links:
        - source: event
          target: place
          kind: atLocation
          confidence: 0.9
