# FollowTheMoney mapping: GDACS disaster alerts -> FtM Event entities.
# Consumed by the ingest pipeline (T2). Field names match cap_bridge / GDACS feed.
gdacs_alerts:
  rag:
    strategy: paragraph
    max_chars: 700
    overlap: 80
    source_key: eventid
    rag_source: gdacs
    body:
      - column: title
      - column: description
        max_chars: 1800
      - columns: [eventtype, alertlevel]
        join: " — "
      - columns: [country, iso3]
        join: " "
  queries:
    - entities:
        event:
          schema: Event
          keys:
            - eventid
          properties:
            name:
              column: title
            description:
              column: description
            date:
              column: fromdate
            endDate:
              column: todate
            location:
              column: country
            country:
              column: iso3
            sourceUrl:
              column: link
            keywords:
              columns:
                - eventtype
                - alertlevel
    - entities:
        event:
          schema: Event
          keys:
            - eventid
          properties:
            name:
              column: title
        place:
          schema: Address
          keys:
            - eventid
          properties:
            full:
              column: title
            latitude:
              column: lat
            longitude:
              column: lon
      require_any:
        - lat
        - lon
      links:
        - source: event
          target: place
          kind: atLocation
          confidence: 0.9
