# FollowTheMoney mapping: AIS contacts -> FtM Vessel entities.
# Consumed by the ingest pipeline (T2). Field names match ais_bridge output.
ais_vessels:
  rag:
    strategy: single
    max_chars: 320
    source_key: mmsi
    rag_source: maritime
    body:
      - template: "VESSEL {name} MMSI {mmsi} IMO {imo} flag {flag} type {type} callsign {callsign}"
  queries:
    - entities:
        vessel:
          schema: Vessel
          keys:
            - mmsi
          properties:
            name:
              column: name
            mmsiCode:
              column: mmsi
            imoNumber:
              column: imo
            flag:
              column: flag
            type:
              column: type
            callSign:
              column: callsign
    - entities:
        vessel:
          schema: Vessel
          keys:
            - mmsi
          properties:
            name:
              column: name
        position:
          schema: Address
          keys:
            - mmsi
          properties:
            full:
              column: name
            latitude:
              column: lat
            longitude:
              column: lon
      require_any:
        - lat
        - lon
      links:
        - source: vessel
          target: position
          kind: atLocation
          confidence: 0.88
