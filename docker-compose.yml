# WorldBase — full containerized stack: FastAPI backend + Caddy (TLS, SPA, /api proxy).
# Quick start:  .\scripts\start-docker.ps1   (ensures a node token, builds, brings up)
# Manual:       docker compose up -d --build
#
# Browser:  https://localhost           (accept the internal-CA cert once)
# Pi sync:  https://<pc-lan-ip>/api/node/ingest   (set WORLDBASE_VERIFY_TLS=0 on the Pi)
#
# Build/runtime config comes from the repo-root .env (see .env.docker.example)
# and from backend/.env (API keys, NODE_INGEST_TOKEN). The latter is optional at
# parse time but required for a LAN-exposed deployment (WORLDBASE_REQUIRE_NODE_TOKEN).

name: worldbase

services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "127.0.0.1:6380:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - worldbase

  backend:
    build:
      context: ./backend
    image: worldbase-backend:local
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      WORLDBASE_DB_PATH: /data/worldbase.db
      WORLDBASE_SELF: http://localhost:8002
      # Reach the host's Ollama from inside the container
      OLLAMA_HOST: ${OLLAMA_HOST:-host.docker.internal:11434}
      # Rate limits — local Redis on the compose network (overrides backend/.env host URL)
      RATE_LIMIT_STORAGE: redis
      RATE_LIMIT_REDIS_URL: redis://redis:6379/0
      RATE_LIMIT_REDIS_CONNECT_TIMEOUT: "2"
      RATE_LIMIT_REDIS_SOCKET_TIMEOUT: "2"
      RATE_LIMIT_REDIS_MAX_CONNECTIONS: "10"
      # Secure-by-default: refuse to start LAN-exposed without a node token
      WORLDBASE_REQUIRE_NODE_TOKEN: ${WORLDBASE_REQUIRE_NODE_TOKEN:-1}
      # Browser origin served by Caddy (extend with your LAN https origin if needed)
      WORLDBASE_CORS_ORIGINS: ${WORLDBASE_CORS_ORIGINS:-}
      # Task queue: set to "celery" to delegate feed ingest + briefing to Celery workers
      WORLDBASE_TASK_QUEUE: ${WORLDBASE_TASK_QUEUE:-celery}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      WORLDBASE_BACKEND_URL: http://backend:8002
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - worldbase-db:/data
      - ./data/pmtiles:/data/pmtiles:ro
    # Backend is NOT published to the host: it is reachable only inside the
    # docker network (Caddy proxies it). This is the most locked-down posture
    # and also sidesteps the Windows loopback-bind quirk on 127.0.0.1:8002.
    # For direct debugging use the Caddy entry (https://localhost/api/health)
    # or `docker compose exec backend curl -s localhost:8002/api/health`.
    # To expose it on the host anyway, use docker-compose.override.yml.
    expose:
      - "8002"
    restart: unless-stopped
    networks:
      - worldbase

  celery-worker:
    build:
      context: ./backend
    image: worldbase-backend:local
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      WORLDBASE_DB_PATH: /data/worldbase.db
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      WORLDBASE_BACKEND_URL: http://backend:8002
      WORLDBASE_TASK_QUEUE: celery
    command: ["celery", "-A", "tasks.celery_app", "worker", "--loglevel=info", "--concurrency=1"]
    restart: unless-stopped
    networks:
      - worldbase

  celery-beat:
    build:
      context: ./backend
    image: worldbase-backend:local
    depends_on:
      redis:
        condition: service_healthy
      celery-worker:
        condition: service_started
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      WORLDBASE_DB_PATH: /data/worldbase.db
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      WORLDBASE_BACKEND_URL: http://backend:8002
      WORLDBASE_TASK_QUEUE: celery
    command: ["celery", "-A", "tasks.celery_app", "beat", "--loglevel=info"]
    restart: unless-stopped
    networks:
      - worldbase

  flower:
    build:
      context: ./backend
    image: worldbase-backend:local
    depends_on:
      redis:
        condition: service_healthy
      celery-worker:
        condition: service_started
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    command: ["celery", "-A", "tasks.celery_app", "flower", "--port=5555"]
    ports:
      - "127.0.0.1:5555:5555"
    restart: unless-stopped
    networks:
      - worldbase

  web:
    build:
      context: ./frontend
      args:
        VITE_CESIUM_ION_TOKEN: ${VITE_CESIUM_ION_TOKEN:-}
        VITE_FLOWSINT_URL: ${VITE_FLOWSINT_URL:-http://localhost:5173}
        VITE_WORLDBASE_API_KEY: ${VITE_WORLDBASE_API_KEY:-}
        VITE_WORLDBASE_AGENT_BUS: ${VITE_WORLDBASE_AGENT_BUS:-}
    image: worldbase-web:local
    depends_on:
      - backend
    environment:
      # PC LAN IP that Caddy issues an internal TLS cert for (Pi reaches this).
      # start-docker.ps1 auto-detects and sets this; falls back to loopback.
      WORLDBASE_LAN: ${WORLDBASE_LAN:-127.0.0.1}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped
    networks:
      - worldbase

volumes:
  worldbase-db:
  caddy-data:
  caddy-config:

networks:
  worldbase:
    driver: bridge
