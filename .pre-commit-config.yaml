repos:
  # --- Backend: ruff (lint + format check) ---
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        files: ^backend/
        types: [python]
      - id: ruff-format
        files: ^backend/
        types: [python]

  # --- Frontend: tsc type-check ---
  - repo: local
    hooks:
      - id: tsc
        name: tsc --noEmit
        entry: bash -c 'cd frontend && npx tsc --noEmit'
        language: system
        types_or: [ts, tsx]
        files: ^frontend/
        pass_filenames: false
