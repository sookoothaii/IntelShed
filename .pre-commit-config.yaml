repos:
  # --- Backend: ruff (lint + format check) ---
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        files: ^backend/
        types: [python]
      - id: ruff-format
        files: ^backend/
        types: [python]

  # --- Frontend: tsc type-check ---
  - repo: local
    hooks:
      - id: tsc
        name: tsc --noEmit
        entry: npx --prefix frontend --package typescript tsc --noEmit --project frontend/tsconfig.json
        language: node
        types_or: [ts, tsx]
        files: ^frontend/
        pass_filenames: false
        additional_dependencies: [typescript@~5.6]
