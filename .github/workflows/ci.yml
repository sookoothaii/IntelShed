name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend (build + typecheck)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Build (tsc + vite)
        env:
          VITE_CESIUM_ION_TOKEN: ci-placeholder-token
        run: npm run build

  frontend-quality:
    name: Frontend (lint + format)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: ESLint
        run: npm run lint
      - name: Prettier check
        run: npm run format:check

  frontend-test:
    name: Frontend (Vitest + RTL)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Run unit + component tests
        run: npm run test
      - name: Run tests with coverage
        run: npm run test:coverage

  frontend-e2e:
    name: Frontend (Playwright E2E)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run E2E tests
        run: npm run test:e2e

  backend:
    name: Backend (import + compile)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt
      - name: Byte-compile
        run: python -m compileall -q .
      - name: Import smoke test
        run: python -c "import main; print('FastAPI app:', main.app.title)"

  backend-quality:
    name: Backend (lint + type check)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Ruff check
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .
      - name: MyPy type check
        continue-on-error: true
        run: mypy --ignore-missing-imports --explicit-package-bases .
      - name: Mapping schema drift check
        run: python -c "import mapping_validator; r=mapping_validator.validate_all_mappings(); exit(0 if r['ok'] else 1)"

  pre-commit:
    name: Pre-commit hooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pre-commit
      - name: Run pre-commit
        run: pre-commit run --all-files

  backend-tests:
    name: Backend (full pytest suite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Run full test suite
        run: python -m pytest -v --tb=short --maxfail=50 -q
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend/.pytest_cache/
          retention-days: 7
