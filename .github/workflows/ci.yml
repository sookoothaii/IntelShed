name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend (build + typecheck)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Build (tsc + vite)
        env:
          VITE_CESIUM_ION_TOKEN: ci-placeholder-token
        run: npm run build

  frontend-quality:
    name: Frontend (lint + format)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: ESLint
        run: npm run lint
      - name: Prettier check
        run: npm run format:check

  backend:
    name: Backend (import + compile)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt
      - name: Byte-compile
        run: python -m compileall -q .
      - name: Import smoke test
        run: python -c "import main; print('FastAPI app:', main.app.title)"

  backend-quality:
    name: Backend (lint + type check)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Ruff check
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .
      - name: MyPy type check
        run: mypy --ignore-missing-imports --explicit-package-bases .

  pre-commit:
    name: Pre-commit hooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pre-commit
      - name: Run pre-commit
        run: pre-commit run --all-files

  backend-tests:
    name: Backend (unit tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Run core unit tests
        run: python -m unittest test_briefing_quality test_operator_briefing test_feed_envelope_contract test_config -v
