name: Deploy Gate

on:
  pull_request:
    branches: [main]

jobs:
  # Aggregate job — requires all other CI jobs to pass before merge.
  # Configure branch protection to require this status check.
  deploy-gate:
    name: Deploy Gate (all checks passed)
    runs-on: ubuntu-latest
    needs:
      - frontend
      - frontend-test
      - backend
      - backend-tests
      - pre-commit
      - typecheck
      - security-audit
      - feed-validation
    steps:
      - name: All checks passed
        run: echo "All required CI checks passed. Ready to deploy."

  # Re-declare jobs from ci.yml as dependencies (GitHub Actions doesn't support
  # cross-workflow needs, so these are stubs that re-run the same checks).
  # If ci.yml already ran these, they'll be duplicated here. To avoid duplication,
  # set this workflow as a required status check instead of individual ci.yml jobs.

  frontend:
    name: Frontend (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Build
        env:
          VITE_CESIUM_ION_TOKEN: ci-placeholder-token
        run: npm run build

  frontend-test:
    name: Frontend (Vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run test

  backend:
    name: Backend (import + compile)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt
      - name: Byte-compile
        run: python -m compileall -q .
      - name: Import smoke test
        run: python -c "import main; print('FastAPI app:', main.app.title)"

  backend-tests:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Run tests
        run: python -m pytest -v --tb=short --maxfail=50 -q

  pre-commit:
    name: Pre-commit hooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --prefix frontend
      - run: pip install pre-commit
      - run: pre-commit run --all-files

  typecheck:
    name: Type Check (mypy + tsc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: pip install -r backend/requirements.txt -r backend/requirements-dev.txt
      - run: npm ci --prefix frontend
      - name: mypy
        continue-on-error: true
        run: cd backend && mypy --ignore-missing-imports --explicit-package-bases .
      - name: tsc
        run: cd frontend && npx tsc --noEmit

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r backend/requirements.txt pip-audit
      - name: pip-audit
        run: cd backend && pip-audit --strict --desc
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --prefix frontend
      - name: npm audit
        run: cd frontend && npm audit --omit=dev --audit-level=high || true

  feed-validation:
    name: Feed Validation
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Feed bridge imports
        run: |
          python -c "
          import importlib, sys, traceback
          bridges = [
              'gdelt_bridge', 'ais_bridge', 'gdacs_bridge', 'cams_bridge',
              'osm_bridge', 'acled_bridge', 'weather_forecast_bridge',
              'news_feeds', 'darkweb_bridge', 'breach_bridge',
              'sanctions_bridge', 'humanitarian_bridge', 'ransomware_tracker',
              'onion_directory', 'thai_opendata', 'telegram_bridge',
              'newsdata_bridge', 'blip_bridge',
          ]
          failed = []
          for mod in bridges:
              try:
                  importlib.import_module(mod)
              except Exception:
                  failed.append(mod)
                  traceback.print_exc()
          if failed:
              print(f'FAILED imports: {failed}')
              sys.exit(1)
          print(f'OK: {len(bridges)} feed bridges imported')
          "
      - name: Mapping validator
        run: python -c "import mapping_validator; r=mapping_validator.validate_all_mappings(); exit(0 if r['ok'] else 1)"
